<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar Cyber Empire | Huokaing Thara</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:#000;
    font-family:'Courier New','Kantumruy Pro',monospace;
    color:#fff;
}

/* Matrix Canvas */

#matrix-canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
    opacity:0.2;
}

/* Monarch Monitor */

.monarch-monitor{
    position:relative;
    z-index:10;
    width:85%;
    max-width:1200px;
    margin:40px auto;
    border:2px solid #ffd700;
    background:rgba(0,10,20,0.95);
    padding:30px;
    box-shadow:0 0 50px rgba(255,215,0,0.15),
    inset 0 0 20px rgba(0,242,255,0.1);
    border-radius:15px;
}

/* Header */

.dashboard-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    color:#ffd700;
    border-bottom:1px solid rgba(255,215,0,0.3);
    padding-bottom:15px;
}

/* Terminal */

#main-terminal{
    height:350px;
    background:rgba(0,5,10,0.9);
    border:1px solid #00f2ff;
    margin-top:20px;
    padding:20px;
    overflow-y:auto;
}

/* Control panel */

.control-panel{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    margin-top:25px;
}

/* Buttons */

.royal-btn{
    background:rgba(0,242,255,0.05);
    border:1px solid #00f2ff;
    color:#00f2ff;
    padding:15px;
    cursor:pointer;
    font-weight:bold;
    text-transform:uppercase;
}

.royal-btn:hover{
    background:rgba(0,242,255,0.25);
    box-shadow:0 0 20px #00f2ff;
    transform:translateY(-3px);
    color:#fff;
}

</style>
</head>

<body>

<canvas id="matrix-canvas"></canvas>

<div class="monarch-monitor">

<div class="dashboard-header">

<div>
<h1>SOLAR CYBER EMPIRE v2.0</h1>
<p style="color:#00f2ff;">
មហាអធិរាជបញ្ជាការដ្ឋានអវកាស៖ លោកម្ចាស់ ហួកាំង ថារ៉ា
</p>
</div>

<div>
<div id="live-clock">00:00:00</div>
<div id="status-tag">SYSTEM LOCKED</div>
</div>

</div>

<div id="main-terminal">

<p style="color:#888;">
> ព្រះរាជប្រព័ន្ធកំពុងរង់ចាំការបញ្ជាក់ព្រះបរមអត្តសញ្ញាណ...
</p>

</div>

<!-- CONTROL PANEL -->

<div class="control-panel">

<button class="royal-btn" onclick="runPenTest()">[I] Cyber Pentest</button>

<button class="royal-btn" onclick="runOverflowTest()">[II] Mercury Stability</button>

<button class="royal-btn" onclick="checkGpsRollover()">[III] Saturn Shield</button>

<button class="royal-btn" onclick="calculateRisk()">[IV] Economy Analysis</button>

<button class="royal-btn" onclick="systemHardware()">[V] Mars Droid Army</button>

<button class="royal-btn" onclick="launchSpacecraft()">[VII] Launch Baksey Cham Krong</button>

<button class="royal-btn" onclick="runV2XMonitor()">[VIII] V2X Traffic Monitor</button>

<button class="royal-btn" onclick="playImperialMusic()">[IX] Play Imperial Music</button>

<button class="royal-btn" onclick="stopImperialMusic()">[X] Stop Music</button>

<button class="royal-btn"
onclick="exportReport()"
style="grid-column: span 2; color:#ffd700; border-color:#ffd700;">

[VI] Archive Imperial Report

</button>

</div>

</div>

<!-- AUDIO -->

<audio id="bg-music" src="solar_cyber_empire/empire.mp3" loop></audio>

<audio id="sound-click" src="solar_cyber_empire/sound-click.mp3"></audio>

<!-- SCRIPT -->

<script>

/* Imperial Music */

function playImperialMusic(){

const music=document.getElementById("bg-music")

music.volume=0

music.play().catch(()=>{console.log("User interaction required")})

let vol=0

const fade=setInterval(()=>{

if(vol<0.4){

vol+=0.05

music.volume=vol

}else{

clearInterval(fade)

}

},200)

}

/* Stop Music */

function stopImperialMusic(){

const music=document.getElementById("bg-music")

music.pause()

}

/* Click Sound */

document.querySelectorAll(".royal-btn").forEach(btn=>{

btn.addEventListener("click",()=>{

const click=document.getElementById("sound-click")

if(click) click.play()

})

})

/* Clock */

function updateClock(){

const now=new Date()

document.getElementById("live-clock").innerText=

now.toLocaleTimeString()

}

setInterval(updateClock,1000)

</script>

</body>
</html>
